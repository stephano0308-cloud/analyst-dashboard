name: Crawl Analyst Data

on:
  schedule:
    - cron: "0 22 * * *"  # KST 07:00
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl Korean stocks
        run: python scripts/crawl_korean.py

      - name: Crawl Foreign stocks
        run: python scripts/crawl_foreign.py

      - name: AI Portfolio Analysis
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze_portfolio.py

      - name: Check for changes
        id: check
        run: |
          git diff --quiet src/data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "analyst-bot"
          git config user.email "analyst-bot@users.noreply.github.com"
          git add src/data/
          git commit -m "data: update analyst data + AI analysis $(date +%Y-%m-%d)"
          git push

  deploy:
    needs: crawl
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - id: deployment
        uses: actions/deploy-pages@v4
