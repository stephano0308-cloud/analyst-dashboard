name: Crawl Analyst Data

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Crawl Korean stocks
        continue-on-error: true
        run: python scripts/crawl_korean.py

      - name: Crawl Foreign stocks
        continue-on-error: true
        run: python scripts/crawl_foreign.py

      - name: AI Portfolio Analysis
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/analyze_portfolio.py

      - name: Commit and push if changed
        run: |
          git diff --quiet src/data/ && echo "No changes" && exit 0
          git config user.name "analyst-bot"
          git config user.email "analyst-bot@users.noreply.github.com"
          git add src/data/
          git commit -m "data: update analyst data $(date +%Y-%m-%d)"
          git push
